# Monitors - Uncomment this and set your monitor if on vm
# monitorrule=Virtial-1,0.55,1,tile,0,1,0,0,1920,1080,60
monitorrule=make:ASUSTek COMPUTER INC,model:ASUS VG249Q1A,width:1920,height:1080,refresh:144,x:0,y:0,scale:1.0
monitorrule=make:Acer Technologies,model:AL1716,width:1280,height:1024,refresh:60,x:1920,y:0,scale:1.0
allow_tearing=1
# Autostart
exec=bash ~/.config/mango/autostart.sh

# modules
env=QT_IM_MODULES,wayland;fcitx
env=XMODIFIERS,@im=fcitx

# essentials
bind=SUPER,Return,spawn,alacritty
bind=SUPER,space,spawn,rofi -show drun
bind=SUPER,e,spawn,thunar
bind=SUPER,s,spawn,/home/arek/.config/mango/snip.sh
bind=SUPER,r,spawn,/home/arek/.config/mango/rebar.sh
xwayland_persistence=1
syscobj_enable=0
allow_shortcuts_inhibit=1

# key
repeat_rate=35
repeat_delay=200
xkb_rules_layout=pl,pl

# mouse
accel_profile=1
accel_speed=-0.5

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide 
layer_animation_type_open=slide
layer_animation_type_close=slide 
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.7
fadein_begin_opacity=0.6
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=1
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,f,togglefloating,

# I am using comboview because I love to shill it.
# It works just like your normal view except
# If you continue the keycombo past the first number, you'll 
# view each subsequent tag with the first.
# If you don't like it just use view
#bind=SUPER,1,comboview,1
#bind=SUPER,2,comboview,2
#bind=SUPER,3,comboview,3
#bind=SUPER,4,comboview,4
#bind=SUPER,5,comboview,5
#bind=SUPER,6,comboview,6
#bind=SUPER,7,comboview,7
#bind=SUPER,8,comboview,8
#bind=SUPER,9,comboview,9
# tag switch
#bind=SUPER,Left,viewtoleft,0
#bind=CTRL,Left,viewtoleft_have_client,0
#bind=SUPER,Right,viewtoright,0
#bind=CTRL,Right,viewtoright_have_client,0
#bind=CTRL+SUPER,Left,tagtoleft,0
#bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# switch layout
#bind=SUPER,n,switch_layout

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# switch window focus
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev

# DWM style binds
bind=SUPER,i,incnmaster,+1
bind=SUPER,d,incnmaster,-1
bind=SUPER,h,setmfact,-0.05
bind=SUPER,l,setmfact,+0.05
bind=SUPER,Return,zoom
bind=SUPER,code:60,focusmon,right
bind=SUPER+shift,code:60,tagmon,right,0
bind=SUPER,q,killclient
bind=SUPER+SHIFT,r,reload_config

# Unfortunately stack based exchange is still being worked on.
# take these lesser directional based ones. 
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# Layouts
bind=SUPER,t,setlayout,tile
bind=SUPER,m,setlayout,monocle
bind=SUPER,v,setlayout,vertical_grid
bind=SUPER+SHIFT,v,setlayout,vertical_scroller

# Layouts in mango are per tag. So we'll set all tags to tile by default. 
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# more layouts:
# vertical:vertical_tile,vertical_scroller,vertical_grid,vertical_monocle,vertical_spiral,vertical_dwindle
# Plus more being added

# gaps
smartgaps=1
gappih=4
gappiv=4
gappoh=4
gappov=4
borderpx=4
no_border_when_single=1
# fun colors are not suckless
focuscolor=0x005577ff

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,-1
mousebind=NONE,btn_right,killclient,0

# Turn off silly defaults
new_is_master=0
enable_hotarea=0
warpcursor=1
sloppyfocus=1
axis_bind_apply_timeout=100
drag_tile_to_tile=1
enable_floating_snap=0
snap_distance=30
